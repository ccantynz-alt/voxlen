name: Build & Release Marco Reid Voice

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - 'release-**'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle_glob: 'src-tauri/target/aarch64-apple-darwin/release/bundle/**/*'
          - platform: windows-latest
            target: ''
            bundle_glob: 'src-tauri/target/release/bundle/**/*'
          - platform: ubuntu-22.04
            target: ''
            bundle_glob: 'src-tauri/target/release/bundle/**/*'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config \
            xdotool \
            xclip \
            libsecret-1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Print toolchain versions
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app (with target)
        if: matrix.target != ''
        run: npm run tauri -- build --target ${{ matrix.target }}

      - name: Build Tauri app (host)
        if: matrix.target == ''
        run: npm run tauri -- build

      - name: Upload build artifacts (always, for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marco-reid-voice-${{ matrix.platform }}-${{ matrix.target || 'host' }}
          path: ${{ matrix.bundle_glob }}
          if-no-files-found: ignore
          retention-days: 7

  release:
    needs: build
    if: success()
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          v=$(node -p "require('./package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten installers
        run: |
          mkdir -p dist-release
          # Pick only shippable installers
          find artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.app.tar.gz' -o \
            -name '*.msi' -o \
            -name '*.exe' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.rpm' \
          \) -exec cp -v {} dist-release/ \;
          ls -la dist-release/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Marco Reid Voice v${{ steps.version.outputs.version }}
          body: |
            Marco Reid Voice v${{ steps.version.outputs.version }} — voice input layer for the Marco Reid platform.

            Download the installer for your OS below.

            First-run note: Windows SmartScreen and macOS Gatekeeper will warn about an unknown publisher on first launch (builds are not code-signed yet). Click "More info → Run anyway" on Windows, or right-click → Open on macOS.

            Governed by the proprietary EULA and the legal pack in `legal/`.
          draft: false
          prerelease: false
          files: dist-release/*
          fail_on_unmatched_files: false

  build-ios:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Build iOS keyboard
        run: |
          if [ -d "ios/VoxKeyboard/VoxKeyboard.xcodeproj" ] || [ -d "ios/VoxKeyboard/VoxKeyboard.xcworkspace" ]; then
            cd ios/VoxKeyboard
            xcodebuild -scheme VoxKeyboard \
              -destination 'generic/platform=iOS' \
              -configuration Release \
              clean build \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO
          else
            echo "iOS Xcode project not yet initialised; skipping iOS keyboard build."
          fi
