<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09090b"/>
      <stop offset="1" stop-color="#1b1b20"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4a24c"/>
      <stop offset="1" stop-color="#b5863a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d4a24c" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#d4a24c" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Soft brass glow behind the mark -->
  <circle cx="260" cy="320" r="220" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Mic mark -->
  <g transform="translate(180, 210)">
    <rect x="40" y="0" width="80" height="130" rx="40" fill="none" stroke="url(#brass)" stroke-width="8"/>
    <path d="M 15 100 Q 15 190, 80 190 Q 145 190, 145 100" fill="none" stroke="url(#brass)" stroke-width="8" stroke-linecap="round"/>
    <line x1="80" y1="190" x2="80" y2="220" stroke="url(#brass)" stroke-width="8" stroke-linecap="round"/>
    <line x1="50" y1="220" x2="110" y2="220" stroke="url(#brass)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Thin brass divider under the wordmark -->
  <line x1="440" y1="240" x2="540" y2="240" stroke="url(#brass)" stroke-width="2"/>

  <!-- Headline -->
  <text x="440" y="215" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="500" fill="#f8f6f2" letter-spacing="-2">
    Marco Reid Voice
  </text>
  <text x="440" y="296" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="34" fill="#d4a24c">
    Speak. It is done.
  </text>

  <!-- Subhead -->
  <text x="440" y="370" font-family="Inter, Helvetica, sans-serif" font-size="26" font-weight="500" fill="#e7e3db">
    Premium AI dictation for lawyers, accountants,
  </text>
  <text x="440" y="404" font-family="Inter, Helvetica, sans-serif" font-size="26" font-weight="500" fill="#e7e3db">
    and professionals who demand precision.
  </text>

  <!-- Pills -->
  <g font-family="Inter, Helvetica, sans-serif" font-size="16" font-weight="600" letter-spacing="1.2">
    <g transform="translate(440, 460)">
      <rect x="0" y="0" width="210" height="44" rx="22" fill="none" stroke="#3a3a42" stroke-width="1.5"/>
      <text x="22" y="28" fill="#e7e3db">ZERO-RETENTION</text>
    </g>
    <g transform="translate(670, 460)">
      <rect x="0" y="0" width="180" height="44" rx="22" fill="none" stroke="#3a3a42" stroke-width="1.5"/>
      <text x="22" y="28" fill="#e7e3db">REAL-TIME</text>
    </g>
    <g transform="translate(870, 460)">
      <rect x="0" y="0" width="230" height="44" rx="22" fill="none" stroke="url(#brass)" stroke-width="1.5"/>
      <text x="22" y="28" fill="#d4a24c">PRIVILEGED-SAFE</text>
    </g>
  </g>

  <!-- Footer URL -->
  <text x="440" y="562" font-family="'Courier New', monospace" font-size="18" fill="#8a8892" letter-spacing="2">
    VOXLEN.AI
  </text>
</svg>
