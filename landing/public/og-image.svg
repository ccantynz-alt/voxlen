<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#1a0e30"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7345d1"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4a24c"/>
      <stop offset="1" stop-color="#b3853a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- soft glow orb -->
  <circle cx="930" cy="315" r="220" fill="#7345d1" opacity="0.18" filter="url(#glow)"/>

  <!-- waveform bars -->
  <g transform="translate(760 315)" opacity="0.85">
    <rect x="0" y="-40" width="10" height="80" rx="5" fill="url(#brand)"/>
    <rect x="22" y="-70" width="10" height="140" rx="5" fill="url(#brand)"/>
    <rect x="44" y="-110" width="10" height="220" rx="5" fill="url(#brand)"/>
    <rect x="66" y="-90" width="10" height="180" rx="5" fill="url(#brand)"/>
    <rect x="88" y="-130" width="10" height="260" rx="5" fill="url(#brand)"/>
    <rect x="110" y="-80" width="10" height="160" rx="5" fill="url(#brand)"/>
    <rect x="132" y="-50" width="10" height="100" rx="5" fill="url(#brand)"/>
    <rect x="154" y="-30" width="10" height="60" rx="5" fill="url(#brand)"/>
    <rect x="176" y="-70" width="10" height="140" rx="5" fill="url(#brand)"/>
    <rect x="198" y="-45" width="10" height="90" rx="5" fill="url(#brand)"/>
    <rect x="220" y="-20" width="10" height="40" rx="5" fill="url(#brand)"/>
  </g>

  <!-- logo mark -->
  <g transform="translate(80 100)">
    <rect x="0" y="0" width="72" height="72" rx="18" fill="url(#brand)"/>
    <path d="M22 24 L36 56 L50 24" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="290" font-family="Inter, system-ui, sans-serif" font-size="120" font-weight="800" fill="#fff" letter-spacing="-4">Voxlen</text>

  <!-- tagline -->
  <text x="80" y="360" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="500" fill="#e4e4e7">Speak. It is done.</text>

  <!-- subtitle -->
  <text x="80" y="430" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400" fill="#a1a1aa">AI voice dictation with real-time grammar correction.</text>
  <text x="80" y="462" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400" fill="#a1a1aa">macOS · Windows · Linux · iOS · Web</text>

  <!-- brass divider -->
  <rect x="80" y="500" width="120" height="3" rx="1" fill="url(#brass)"/>

  <!-- footer -->
  <text x="80" y="540" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#d4a24c">Built for lawyers, accountants, and professionals who talk for a living.</text>

  <!-- url -->
  <text x="80" y="580" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="500" fill="#71717a">voxlen.ai</text>
</svg>
